name: Daily Health Check

on:
  schedule:
    # 09:00 JST == 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # compose.yaml's `api` service reads its config from `.env` (env_file).
      # These are non-production test defaults, mirroring .env.example -- no
      # secrets are used for this monitoring job.
      - name: Write .env for Docker Compose
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql+asyncpg://ledger_user:password@db:5432/ledger_db
          REDIS_URL=redis://redis:6379
          SECRET_KEY=health-check-not-a-real-secret
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          DEBUG=false
          LOCUST_ADMIN_EMAIL=admin@example.com
          LOCUST_ADMIN_PASSWORD=changeme
          DB_POOL_SIZE=5
          DB_MAX_OVERFLOW=10
          EOF

      - name: Build and start services
        run: docker compose up -d --build --wait

      - name: Wait for API to be ready
        run: |
          timeout=60
          interval=5
          elapsed=0
          until [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health)" = "200" ]; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "::error::API did not return HTTP 200 from /health within ${timeout}s"
              docker compose logs api
              exit 1
            fi
            echo "Waiting for API... (${elapsed}s/${timeout}s)"
            sleep "$interval"
            elapsed=$((elapsed + interval))
          done
          echo "API is ready."

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run test suite
        run: uv run pytest -v --tb=short

      - name: Tear down services
        if: always()
        run: docker compose down -v

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 Daily health check failed — $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          The scheduled daily health check failed.

          - **Workflow:** ${{ github.workflow }}
          - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **Commit:** ${{ github.sha }}
          - **Triggered by:** ${{ github.event_name }}

          A step in the `health-check` job failed (API readiness probe or the
          test suite). See the run logs linked above for details.
          EOF
          )"
