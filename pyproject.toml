[project]
name = "payment-ledger-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "fastapi[standard]>=0.115",
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.29",
  "alembic>=1.13",
  "pydantic-settings>=2.3",
  "psycopg>=3.3.4",
  "python-dotenv>=1.2.2",
]

[dependency-groups]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.24",
  "httpx>=0.27",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv]
link-mode = "copy"
