services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    # Dockerfile's CMD now runs the production-equivalent
    # multi-worker server (uvicorn --workers 4, no auto-reload).
    # For local development, override it with `fastapi dev` so
    # WatchFiles hot-reload keeps working with the source bind mount
    # below. To exercise the multi-worker command locally (e.g. for a
    # locust run), comment out this `command:` line and run
    # `docker compose up -d --build api`.
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000
    # Mount local source into the container so code changes are reflected
    # without rebuilding the image. .venv is excluded to avoid overwriting
    # the packages installed during docker build.
    volumes:
      - .:/app
      - /app/.venv # anonymous volume: keeps the container's .venv intact
      - /var/run/docker.sock:/var/run/docker.sock

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "4317:4317" # OTLP gRPC (exporter target)
      - "16686:16686" # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Load test runner. Excluded from normal `docker compose up` via
  # `profiles` -- start explicitly with `--profile loadtest`.
  locust:
    image: locustio/locust:2.32.4
    profiles: [loadtest]
    ports:
      - "8089:8089" # Web UI
    depends_on:
      - api
    environment:
      LOCUST_ADMIN_EMAIL: ${LOCUST_ADMIN_EMAIL:?Set LOCUST_ADMIN_EMAIL in .env (see .env.example)}
      LOCUST_ADMIN_PASSWORD: ${LOCUST_ADMIN_PASSWORD:?Set LOCUST_ADMIN_PASSWORD in .env (see .env.example)}
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
      - ./docs/loadtest:/mnt/locust/docs/loadtest
    command: -f /mnt/locust/locustfile.py --host http://api:8000

volumes:
  pgdata:
